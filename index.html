<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="The Commit with Nick: monthly technical knowledge-sharing on Vue.js, AI workflows, and modern dev patterns." />
    <title>The Commit with Nick</title>
    <!-- Inline theme init: prevents flash of wrong color scheme before Vue boots -->
    <script>
      (function () {
        var stored = localStorage.getItem('the-commit-theme')
        if (stored === 'light' || stored === 'dark') {
          document.documentElement.setAttribute('data-theme', stored)
        }
      })()
    </script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
